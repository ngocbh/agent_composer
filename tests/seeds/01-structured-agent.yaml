# 01 — Structured (object) AGENT output.
#
# An AGENT returns ONE object {rating, rationale}; a downstream CODE node reads a
# field via dotted access. Shows: object output declared as a dataclass-style map,
# ${node.output.field} dotted access, a CODE consumer (flat `code:` field), and the
# inferred graph.

id: structured-agent
name: structured_agent
description: Score a topic into {rating, rationale}, then format a one-line verdict.

input:
  topic: str

nodes:
  score:
    kind: agent
    input:
      topic: ${input.topic}
    output:                    # an OBJECT type (this node returns one object = a record)
      rating: float             #   a relevance-ish score in [-1, 1]
      rationale: str
    # A structured AGENT is forced to emit exactly these typed fields (design §6 —
    # the phase-5 capability; shown here so the syntax is on record).
    prompt: |-
      Score ${topic}'s near-term relevance as {rating, rationale}.
      rating is a number in [-1,1]; rationale is one sentence. Neutral, no advice.

  verdict:
    kind: code
    input:                     # sink bindings — dot into the object output of `score`
      rating: ${score.output.rating}
      rationale: ${score.output.rationale}
    output: str
    code: tests.seeds.fns:one_line_summary   # module:function (flat kind-field)

output:
  rating: ${score.output.rating}      # several bindings -> the flow returns ONE object
  verdict: ${verdict.output}
