# 21 — inline ${ f(...) } call expression: function-call syntax inside a binding.
#
# An inline call is SUGAR: `${ enrich(topic=${input.topic}) }` written in a node
# input desugars AT LOAD into an anonymous `call` node (kind: call), and the host
# binding becomes `${<synth>.output}` — pure surface sugar, no new runtime kind. It
# is the applicative form of seed 20's named `call` node: write `f x` inline instead
# of declaring a separate node for it. Shows: an inline call in a node input, keyword
# args whose values are full bindings (a `${ref}` here), and resolution DEFS-FIRST
# (the callee is the in-file `enrich` def, so the flow loads resolver-free).

id: inline-call
name: inline_call
description: Enrich one topic via an INLINE call expression (sugar over a call node).

input:
  topic: str

defs:
  enrich:                      # an in-file callable — a sub-flow (as in seed 20)
    input:
      topic: str
    nodes:
      fetch:
        kind: code
        code: tests.seeds.fns:fetch_facts
        input:
          topic: ${input.topic}
        output:
          values: list[float]
          news: list[str]
    output: ${fetch.output.news}     # the callee's codomain (the headlines)

nodes:
  summary:
    kind: agent
    input:
      # INLINE call: desugars to a synth `call` node (call: enrich) whose value
      # (list[str] of headlines) this input then binds — equivalent to declaring a
      # separate `kind: call` node and referencing ${<that node>.output}.
      news: ${ enrich(topic=${input.topic}) }
    output: str
    prompt: |-
      Summarize these headlines in one neutral sentence (no recommendations):
      ${news}

output: ${summary.output}
