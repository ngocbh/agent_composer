# 08 — TOOL: a direct, deterministic tool invocation.
#
# Pull recent news for a topic via a registered tool, then an AGENT summarizes.
# Shows: kind: tool with flat tool_id (a TOOL_REGISTRY key) + untyped `args` (bound
# like inputs — ${...} or literal), the tool's whole value consumed downstream, and
# the whole-string (typed) vs embedded (stringified) ${...} distinction.

id: tool-news
name: tool_news
description: Pull recent news for a topic via a registered tool, then summarize neutrally.

input:
  topic: str

nodes:
  news:
    kind: tool
    tool_id: get_facts    # a real TOOL_REGISTRY key
    args:                        # untyped args — each value is a ${...} ref or a literal
      symbol: ${input.topic}
      limit: 10

  summarize:
    kind: agent
    input:
      topic:   ${input.topic}
      articles: ${news.output}  # whole-string ${...} -> the tool's typed value (a list)
    output: str
    prompt: |-
      Summarize the key themes across these ${topic} news items in three neutral
      bullet points; cite item indices. No recommendations.
      ${articles}

output: ${summarize.output}
