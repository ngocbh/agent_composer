# 05 — MAP + over: typed iteration over a list (List.map), then fan-in.
#
# Research EACH topic in a bundle (a mapped call of research_one per element, in
# parallel), collect the reports as a list, then an AGENT compares them. Shows: a mapped
# call (kind: map with `over:` + `${item}`), parallel element runs, the map node's value
# IS the collected list, fan-in by consuming ${<call>.output}, a defaulted list param +
# an Optional[date] param, the `:-` default operator, a top-level `asserts:` check, an
# optional `node_name:`, and a multi-output return.

id: call-map
name: call_map
description: Research a bundle of topics (mapped call) and compose a neutral comparison.

input:
  topics: list[str] = ["ACME", "BETA"]   # the bundle, defaulted (dataclass-style)
  as_of: Optional[date]                    # optional param (omitted -> null)

uses:
  research-one: 03-research-one   # external sibling flow, resolved by filename on the search path

nodes:
  research_each:
    kind: map
    node_name: Research each topic     # optional human label
    over: ${input.topics}     # a list[T]; each ${item} is one element (a str)
    call: research-one          # resolves via the uses: alias above, applied once per topic
    input:                     # sink: per-element call args; ${item} in scope here
      topic: ${item}
      as_of:  ${input.as_of:-today}    # default operator: the optional param, else the bare literal today
    parallel: true
    # research_each's value IS the list of callee returns -> list[{report, asof}].
    # Reference the whole list as ${research_each.output}.

  compare:
    kind: agent
    input:
      briefs: ${research_each.output}        # the list[{report, asof}] — fan-in
    output: str
    prompt: |-
      You are a neutral editor given a list of research briefs (one per company):
      ${briefs}
      Compose ONE Markdown report comparing them across fundamentals, growth, and
      recent news. Preserve inline citations [n]. No recommendations. Be even-handed.

output:                       # multi-output: the flow returns one object
  report: ${compare.output}
  briefs: ${research_each.output}

asserts:                       # boolean checks over ${inputs}/${outputs}; a false fails the run
  - ${input.topics} != []                 # the bundle must be non-empty
