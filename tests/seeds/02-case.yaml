# 02 — Branching with a `case` node (searched form) + a coalesce join.
#
# A score routes to one of two AGENT takes; the flow returns whichever ran, via a
# coalesce binding. Shows: a `case` node (SQL searched form — when:/then: + else:),
# control routing inferred from then/else targets (no edges:), the recursive
# skip-flood (only the taken branch runs), and ${a | b} coalesce to collect
# "whichever branch produced a value".

id: case
name: case_router
description: Route a topic to a positive or cautious take based on a score threshold.

input:
  topic: str

nodes:
  score:
    kind: agent
    input:
      topic: ${input.topic}
    output: float
    prompt: "Rate ${topic}'s near-term relevance as a single number in [-1, 1]. Output only the number."

  gate:
    kind: case
    # A `case` routes only — no inputs:. The edge score -> gate is inferred from the
    # ${score.output} ref in when:. Each `when:` is a boolean expression; the first
    # true one's `then:` runs. `else:` is the unconditional fallback branch.
    cases:
      - when: "${score.output} >= 0.5"
        then: positive
    else: cautious

  positive:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a neutral pro case for ${topic} in 3 sentences. No advice."

  cautious:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a neutral cautionary note for ${topic} in 3 sentences. No advice."

# Exactly one of positive/cautious runs; the other is skip-flooded and never writes a
# value, so its ref resolves to null. Coalesce picks the one that ran.
output: ${positive.output | cautious.output}
