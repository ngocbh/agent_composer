# 06 — `case ... on`: match a node's value against alternatives.
#
# A classifier AGENT emits a label; `case ... on` routes on that VALUE — SQL's simple
# form `CASE <expr> WHEN <value> ... ELSE`, the OCaml `match`. Contrast 02, the
# searched form (`case` with no `on:`, each `when:` a boolean). Shows: the `on:` form,
# value matching, an `else:` fallback, and a 3-way n-ary `|` coalesce join.

id: case-on
name: case_on_category
description: Classify a topic's market category, then route to a category-specific note.

input:
  topic: str

nodes:
  classify:
    kind: agent
    input:
      topic: ${input.topic}
    output: str                # one of "pro" | "con" | "mixed"
    prompt: |-
      Classify ${topic}'s current market category as exactly one lowercase word —
      pro, con, or mixed. Output only that word.

  route:
    kind: case
    on: ${classify.output}     # simple form: match this VALUE (vs N boolean when:s)
    cases:                      # here `when:` is a value to match, not a boolean
      - when: pro
        then: pro_note
      - when: con
        then: con_note
      - when: mixed
        then: choppy_note
    else: choppy_note           # fallback when the value matches nothing

  pro_note:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a neutral 2-sentence note on ${topic} in an rising context. No advice."

  con_note:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a neutral 2-sentence note on ${topic} in a falling context. No advice."

  choppy_note:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a neutral 2-sentence note on ${topic} in a range-bound context. No advice."

# Exactly one branch runs; the rest skip-flood to null. The 3-way coalesce returns
# whichever ran — this is what `|` does that nested `:-` can't do cleanly.
output:
  category: ${classify.output}
  note:   ${pro_note.output | con_note.output | choppy_note.output}
