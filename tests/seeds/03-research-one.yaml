# 03 — Single-topic research (a reusable child flow).
#
# A small CODE -> AGENT pipeline that researches ONE topic and returns {report, asof}.
# This is the atomic unit; 04 (REF) and 05 (MAP) compose it. Shows: a CODE data-fetch
# leaf (flat `code:`), ${input.X} + a dataclass-style parameter default (as_of), an
# object output, and a node binding from another node's object field.

id: research-one
name: research_one
description: Research a single topic into {report, asof} as of a date.

input:
  topic: str
  as_of: date = today          # a parameter with a default (dataclass-style: TYPE = default)

nodes:
  fetch:
    kind: code
    input:
      topic: ${input.topic}
      as_of:  ${input.as_of}
    output:                    # an object: values + recent headlines
      values: list[float]
      news:   list[str]
    code: tests.seeds.fns:fetch_facts   # deterministic data pull

  synth:
    kind: agent
    input:
      topic: ${input.topic}
      asof:   ${input.as_of}
      values: ${fetch.output.values}          # dot into fetch's object output
      news:   ${fetch.output.news}
    output: str
    prompt: |-
      Write a neutral research brief for ${topic} as of ${asof}.
      Recent closes: ${values}. Headlines: ${news}.
      Cite the headlines as [n]. No recommendations.

output:
  report: ${synth.output}
  asof:   ${input.as_of}
