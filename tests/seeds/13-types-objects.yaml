# 13 — The type grammar (Python typing): scalars, lists, objects, nesting.
#
# A planning CODE node whose I/O exercises every type form. Shows: all scalars
# (str / int / float / bool / date), list[X], inline vs block objects (records),
# nested objects, and deep dotted access (${plan.output.summary.meta.as_of}).

id: types-objects
name: types_objects
description: Exercise the type grammar — scalars, list[X], inline/block/nested objects.

input:
  topic: str
  names: list[str]             # (the old `topics` alias is just list[str] now)
  quantity: int
  budget: float
  as_of: date
  dry_run: bool
  weights: list[float]
  config:                      # a nested object parameter (block style)
    regroup: bool
    bands: { lower: float, upper: float }   # inline object (no [ ] or ${} inside -> OK)

nodes:
  plan:
    kind: code
    input:
      topic:  ${input.topic}
      names:   ${input.names}
      quantity:  ${input.quantity}
      budget:  ${input.budget}
      as_of:   ${input.as_of}
      dry_run: ${input.dry_run}
      weights: ${input.weights}
      config:  ${input.config}    # bind the whole nested object
    output:                       # a nested object output
      items: list[str]
      summary:
        count: int
        total: float
        meta: { as_of: date, dry_run: bool }   # nested inline object
    code: tests.seeds.fns:build_outline

output:
  items: ${plan.output.items}
  count:  ${plan.output.summary.count}         # dot into a nested object output
  as_of:  ${plan.output.summary.meta.as_of}    # two-level dotted access
