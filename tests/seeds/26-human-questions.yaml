# 26 — HUMAN_INPUT questions: the three question surfaces.
#
# A `human_input` gate suspends the run for a person and collects a STRUCTURED
# answer keyed by each question's `header`. The gate carries its questions in one
# of three forms:
#
#   (A) static     — a literal `questions:` list written in the YAML (THIS seed).
#   (C) manual ref — a `code`/agent node produces the list, fed via
#                    `input: {qs: ${src.output}}` + `questions: ${qs}`.
#   (B) adaptive   — an `adaptive_questions:` block `{prompt: <brief>, ...}` that
#                    desugars at load into a synth compose-agent + the gate.
#
# This seed pins form (A): two questions (one single-select with options, one
# free-text), `${proj}` templated into a question to prove rendering. The gate's
# output defaults to `object` — a record keyed by header (e.g. {Framework: React,
# Notes: "..."}) — and the flow routes its terminal value on that answer.

id: human_questions
name: human_questions_static
description: Ask a person a static set of questions, then route on the keyed answer.

input:
  proj: str

nodes:
  ask:
    kind: human_input
    input:
      proj: ${input.proj}            # context the question text may reference (bare ${proj})
    questions:
      - question: "Which framework for ${proj}?"   # ${proj} renders against the bound input
        header: Framework                          # the answer key — {Framework: <label>}
        options:
          - label: React
            description: A component library.
          - label: Vue
            description: A progressive framework.
      - question: "Any notes for the build?"       # no options -> a free-text question
        header: Notes
    # output omitted -> defaults to `object`: the answer record keyed by header.

  pick:
    kind: code
    input:
      ans: ${ask.output}             # the delivered {Framework, Notes} record
    output: str
    code: tests.seeds.fns:chosen_framework

output: ${pick.output}
