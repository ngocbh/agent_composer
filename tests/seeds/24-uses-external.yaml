# 24 — USES: call an EXTERNAL flow (Python-import style) — feature F.
#
# `uses:` declares an external callable bound to a local alias; a node then `call:`s the
# alias like any in-file callable. The alias's ref (`lib_verdict`) is resolved on the
# SEARCH PATH — by default the dir of this file (so a sibling `lib_verdict.yaml` is found).
# A `@version` is an optional GUARD: `lib_verdict@v1` still resolves `lib_verdict.yaml`,
# then asserts that file's declared `version:` field equals `v1`. A `hub:` scheme is
# reserved for the future marketplace. CODE-only end to end -> runs locally, no model.
#
# Run it with the file resolver pointed at this dir:
#   load_flow(text, search_paths=[<seeds dir>]); run_flow(loaded, {...})

id: uses-external
name: uses_external
description: "Call an external (sibling-file) flow via uses: — the F demo."

input:
  rating: float
  rationale: str

uses:
  verdict: lib_verdict@v1       # external flow on the search path; @v1 = version guard

nodes:
  say:
    kind: call
    call: verdict               # resolves: defs-first -> uses alias -> host
    input:
      rating: ${input.rating}
      rationale: ${input.rationale}

output:
  line: ${say.output}          # the callee's single value (the verdict string)
