# 00 — Hello agent.
#
# The smallest useful flow: one AGENT turns a topic into a one-paragraph note.
# Shows: the top-level inputs:/outputs: interface (Compose-style), a single AGENT,
# a scalar (str) value in and out, a bare flow return, and the INFERRED graph.

id: hello-agent
name: hello_agent
description: One AGENT turns a topic into a neutral one-paragraph note.

input:                       # the flow's parameters (top-level section)
  topic: str                 # a str leaf = a scalar type (a required parameter)

nodes:                        # a MAP keyed by node id (no `id:` field, no `edges:`)
  note:
    kind: agent
    input:                   # sink binding -> infers the edge inputs -> note
      topic: ${input.topic}
    output: str              # source: a type — this node returns ONE string
    prompt: |-                # `prompt` is a flat kind-field on the node
      Write a single neutral paragraph on ${topic}.   # bare ${topic} = this node's input
      Describe what the company does and one recent fact. No recommendations.

output: ${note.output}      # the flow's return — a binding; flow returns that string

# No edges: — the graph is inferred from the ${...} bindings (data) and, where
# present, a case node's then/else targets (control).
