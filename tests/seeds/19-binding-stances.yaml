# 19 — Input-binding stances: required, optional, branch-join, fail-loud, co-skip.
#
# Every way a node input can relate to its source, in one flow. Pins the PER-INPUT
# readiness model from the adversarial review
# (docs/plans/2026-06-11-alang-v1-surface-adversarial-review.md → CC3 / Problem 2):
# a node runs iff EVERY input is satisfied, where an input is satisfied if its plain
# ref is TAKEN, or a coalesce has >=1 alternative TAKEN, or it has a literal fallback.
# So OPTIONALITY IS A PROPERTY OF THE BINDING (a fallback), not a flag:
#
#   ${x.output}                       required (plain)      -> co-skip if x was skipped
#   ${x.output:-null}                 optional (default)    -> run anyway, bind null
#   ${a.output | b.output}           branch-join           -> run if either ran
#   ${a.output | b.output:-null}     join + survive        -> always runs
#   ${x.output:?msg}                  required, fail-loud   -> run fails with msg
#
# Shows: a `case` branch, a node that CO-SKIPS with its branch (pro_detail), and an
# assembler exercising every stance. Trace both branches to see co-skip vs optional.

id: binding-stances
name: binding_stances
description: One flow exercising every input-binding stance (required / optional / join / fail-loud / co-skip).

input:
  topic: str
  as_of: Optional[date]            # optional param — omitted -> null

nodes:
  # --- roots: read only flow inputs, so they always run ---
  score:
    kind: agent
    input:
      topic: ${input.topic}
    output: float
    prompt: "Rate ${topic}'s near-term relevance in [-1, 1]. Output only the number."

  macro:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write one neutral sentence on the macro backdrop for ${topic}. No advice."

  # --- the branch: exactly one of pro/con runs ---
  gate:
    kind: case
    cases:
      - when: "${score.output} >= 0.5"
        then: pro
    else: con

  pro:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a neutral 2-sentence pro case for ${topic}. No advice."

  con:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a neutral 2-sentence cautionary note for ${topic}. No advice."

  # --- co-skip: a plain (required) ref to a branch output. Runs ONLY in the pro
  #     branch; when gate routes to con, pro is skipped and pro_detail co-skips. ---
  pro_detail:
    kind: agent
    input:
      claim: ${pro.output}            # plain -> REQUIRED -> co-skips with pro
    output: str
    prompt: "Expand this pro claim into one extra neutral sentence: ${claim}"

  # --- the assembler: every stance in one node's inputs ---
  assemble:
    kind: agent
    input:
      backdrop: ${macro.output}                       # REQUIRED (plain) — macro always runs
      claim:   ${pro.output | con.output}         # BRANCH-JOIN — whichever branch ran
      detail:   ${pro_detail.output:-null}           # OPTIONAL — null when the pro branch didn't run
      when:     ${input.as_of:-${system.today}}       # OPTIONAL param — one nested ${...}
                                                       #   default: as_of, else the host clock
      topic:   ${input.topic:?a topic is required} # REQUIRED + FAIL-LOUD at the use site
                                                       #   (belt-and-suspenders: topic is already a required param)
    output: str
    prompt: |-
      Backdrop: ${backdrop}
      Claim: ${claim}
      Extra colour (may be empty): ${detail}
      As of: ${when}  ·  Topic: ${topic}
      Compose one neutral paragraph from the above. No recommendations advice.

output: ${assemble.output}
