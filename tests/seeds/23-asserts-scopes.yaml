# 23 — Asserts at every scope (flow / def-child / node).
#
# One relevance-desk flow that exercises all THREE assert scopes plus the inline-call
# form. A false (or raising) assert at any scope fails the run loudly.
#
#   - FLOW   asserts: top-level `asserts:` — boundary (${inputs}/${system}, before any
#            node) or post (${X.output}, after the terminal); a span-wrapped inline
#            `${ call(...) }` runs a callable and is post-checked.
#   - DEF    asserts: a `defs:` callable's top-level `asserts:` — enforced at the REF/MAP
#            child seam (boundary before the child runs, post after it terminates).
#   - NODE   asserts: a node's `asserts:` — the per-node contract; node-LOCAL refs only:
#            bare `${name}` = a declared input (PRE, before _run), `${output}`/`${output.field}`
#            = the node's own output (POST, after _run). Not on a `case` or a mapped `call`;
#            no inline `${call}` inside (those are flow-level).

id: asserts-scopes
name: asserts_scopes
description: Asserts at every scope — flow (boundary/post + inline-call), def-child, and node.

input:
  topic: str
  window: int = 30
  weight: float = 0.02

defs:
  # A callable sub-flow. Its top-level `asserts:` are DEF/CHILD-scope — enforced at the
  # call seam when `score_one` runs (NOT in this file's top-level run).
  score_one:
    input:
      topic: str
      window: int
    nodes:
      raw:
        kind: model
        model_id: topic-ranker-v1
        input:
          topic: ${input.topic}
          window: ${input.window}
        output: float
    output: ${raw.output}
    asserts:
      - "${input.window} >= 5"                       # child BOUNDARY — before the child runs
      - "${raw.output} >= -1 and ${raw.output} <= 1"  # child POST — after the child terminates

nodes:
  # A `call` to the def. Its OWN `asserts:` are NODE-scope (this call node's contract);
  # the def's asserts above fire independently, inside the call, at the child seam.
  score:
    kind: call
    call: score_one
    input:
      topic: ${input.topic}
      window: ${input.window}
    asserts:
      - "${window} >= 5"     # NODE PRE  — bare ${name} = this node's declared input, before _run
      - "${output} >= -1"      # NODE POST — ${output} = the call's re-exported value, after _run

  # A `case` routes only — it cannot carry `asserts:` (assert the branch targets instead).
  size:
    kind: case
    cases:
      - when: "${score.output} > 0 and ${input.weight} * 100 <= 5"
        then: take
    else: skip

  take:
    kind: agent
    input:
      topic: ${input.topic}
      rating: ${score.output}
    output: str
    prompt: "Write a two-sentence rationale for buying ${topic} (rating ${rating}). No advice."
    asserts:
      - "${output} != \"\""    # NODE POST — the rationale must be non-empty

  skip:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Write a two-sentence note on why ${topic} is passed for now. No advice."

output:
  decision: ${take.output | skip.output}

asserts:
  # FLOW boundary — only ${inputs}/${system}; checked BEFORE any node (fail-fast).
  - "${input.window} >= 5 and ${input.window} <= 252"
  - "${input.weight} >= 0 and ${input.weight} <= 1"
  # FLOW post — reads ${<node>.output} (a node's output); checked AFTER the terminal.
  - "${score.output} >= -1 and ${score.output} <= 1"
  # FLOW inline-call — a span-wrapped ${call} runs a callable (a synth node); post-checked.
  - "${ score_one(topic=${input.topic}, window=${input.window}) } >= -1"
