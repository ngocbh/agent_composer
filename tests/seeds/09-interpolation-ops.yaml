# 09 — Interpolation operator forms.
#
# One AGENT brief that exercises the ${...} operator forms: required (:?), a coalesce
# chain (|), the $$ escape, and the ${system.X} host-ambient namespace.
# Optional[date] params feed the coalesce chain.

id: interpolation-ops
name: interpolation_ops
description: Showcase ${...} operator forms — required, default-chain, $$ escape, system.

input:
  topic: str
  as_of: Optional[date]         # optional (omitted -> null)
  fallback_date: Optional[date]

nodes:
  brief:
    kind: agent
    input:
      # required AT THE USE SITE — fail with this message if absent (vs param-level required)
      topic: ${input.topic:?a topic is required}
      # coalesce chain: as_of, else fallback_date, else the host clock (first-present)
      as_of:  ${input.as_of | input.fallback_date | system.today}
      run_id: ${system.run_id}     # host-ambient namespace (run id / clock / tenant)
    output: str
    prompt: |-
      Write a neutral one-paragraph brief on ${topic} as of ${as_of}.
      All figures are in US dollars ($$).   # $$ -> a literal $ (not interpolated)
      (run ${run_id})

output: ${brief.output}
