# 25 — Nested suspension: a HUMAN_INPUT inside a called child (Phase 2).
#
# Pre-Phase-2 a HUMAN_INPUT/WAIT reachable inside a REF/MAP child was compile-rejected
# (alang §4A — "a child can't suspend yet"). Phase 2 LIFTS that: the parent `call`s an
# in-file `defs:` callable whose body suspends on a HUMAN_INPUT; the engine grows the live
# graph via Enqueue, the inner effect parks under its NAMESPACED leaf id (`review/approve`),
# and the deliver-as-Output resume feeds the answer into the namespaced child node. Shows:
# nested suspension via graph-growth, a HUMAN_INPUT in a child, `case … on` routing the
# answer inside the child, and the child re-exporting its confirmed value to the parent.

id: nested-suspension
name: nested_suspension
description: Call a child that asks a human to approve, then confirm — pausing inside the child.

typedefs:
  Approval: Literal[approve, reject]

input:
  action: str

defs:
  review:                       # an in-file callable that SUSPENDS on a HUMAN_INPUT
    input:
      action: str
    nodes:
      approve:
        kind: human_input
        input:
          action: ${input.action}
        prompt: "Approve this action? ${action}  (approve / reject)"
        output: Approval       # the injected answer, validated against Approval's tags
      record:
        kind: code
        input:
          answer: ${approve.output}
        output: str
        code: tests.seeds.fns:confirm_action
    output: ${record.output}  # the child's codomain (the confirmed answer)

nodes:
  gate:
    kind: call
    call: review                # resolves to the in-file def above (defs-first)
    input:
      action: ${input.action}

output: ${gate.output}
