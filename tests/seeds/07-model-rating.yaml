# 07 — MODEL: ML inference as a node kind.
#
# An ML model scores a topic from a feature vector; an AGENT explains the score.
# Shows: kind: model with flat model_id / weights_uri / runtime, list[float] + int
# types, an object model output, and dotted access downstream.

id: model-rating
name: model_signal
description: Score a topic with an ML model, then explain the score neutrally.

input:
  topic: str
  features: list[float]         # a precomputed feature vector

nodes:
  predict:
    kind: model
    model_id: topic-ranker-v1                                  # resolved by the host ML-serving seam (not wired yet)
    weights_uri: "manifold://calpha/models/topic-ranker-v1.pt" # optional artifact URI
    runtime: torchscript                                          # optional runtime hint
    input:
      topic:   ${input.topic}
      features: ${input.features}
    output:                     # the model returns ONE object
      score: float
      rank:  int

  explain:
    kind: agent
    input:
      topic: ${input.topic}
      score:  ${predict.output.score}     # dot into the model's object output
      rank:   ${predict.output.rank}
    output: str
    prompt: |-
      Explain in two neutral sentences what a relevance score of ${score}
      (rank ${rank}) implies for ${topic}. No recommendations.

output:
  score:       ${predict.output.score}
  explanation: ${explain.output}
