# 18 — A realistic end-to-end research → decision → note pipeline.
#
# The shape a user actually ships (not a feature in isolation): three reviewer AGENTs fan OUT
# over the same topic, a synth AGENT fans them IN to a typed View {stance, claim,
# confidence}, a `case … on` routes the stance to one of three notes, and the flow returns a
# multi-field object. Pressure-tests fan-out + fan-in + typed records/enums + case-on +
# coalesce join + asserts, TOGETHER.
#
# A realistic end-to-end research pipeline (fan-out reviewers -> synth -> case -> multi-output).

id: research-pipeline
name: research_pipeline
description: Fan out reviewers, synthesize a typed stance, route to a stance-specific note.

typedefs:
  Stance: Literal[positive, negative, neutral]
  View:
    stance: Stance
    claim: str
    confidence: float            # in [0, 1] (checked in asserts:)

input:
  topic: str
  as_of: Optional[date]          # omitted -> null; the reviewers default it to today

nodes:
  # --- fan-out: three independent reviewers (no edges between them) ---
  fundamentals:
    kind: agent
    input:
      topic: ${input.topic}
      as_of: ${input.as_of:-today}     # :- default — the optional param, else literal today
    output: str
    prompt: "Summarize ${topic} fundamentals as of ${as_of} in 3 neutral sentences."
  news:
    kind: agent
    input:
      topic: ${input.topic}
      as_of: ${input.as_of:-today}
    output: str
    prompt: "Summarize recent ${topic} news as of ${as_of} in 3 neutral sentences. Keep [n] citations."
  social:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Summarize current social sentiment on ${topic} in 3 neutral sentences."

  # --- fan-in: synthesize a typed View ---
  synth:
    kind: agent
    input:
      fundamentals: ${fundamentals.output}
      news: ${news.output}
      social: ${social.output}
    output: View                       # one object {stance, claim, confidence}
    prompt: |-
      Given three neutral briefs —
      fundamentals: ${fundamentals}
      news: ${news}
      social: ${social}
      Produce a View: stance (positive|negative|neutral), claim (one paragraph), confidence in
      [0,1]. Even-handed; no recommendations advice.

  # --- decision: route on the stance enum ---
  route:
    kind: case
    on: ${synth.output.stance}         # a Stance enum -> simple-form routing
    cases:
      - when: positive
        then: pro_note
      - when: negative
        then: con_note
    else: neutral_note

  pro_note:
    kind: agent
    input:
      claim: ${synth.output.claim}
    output: str
    prompt: "Expand this into a neutral 5-sentence pro note: ${claim}"
  con_note:
    kind: agent
    input:
      claim: ${synth.output.claim}
    output: str
    prompt: "Expand this into a neutral 5-sentence con note: ${claim}"
  neutral_note:
    kind: agent
    input:
      claim: ${synth.output.claim}
    output: str
    prompt: "Expand this into a balanced 5-sentence note: ${claim}"

output:                                # multi-output: the flow returns one object
  stance: ${synth.output.stance}
  confidence: ${synth.output.confidence}
  note: ${pro_note.output | con_note.output | neutral_note.output}

asserts:
  - ${synth.output.confidence} >= 0 and ${synth.output.confidence} <= 1
