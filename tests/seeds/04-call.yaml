# 04 — CALL: typed function application (call another flow).
#
# Calls the `research_one` callable on one topic, then an AGENT adds a one-line
# take. Shows: a `call` node (kind: call) with flat `call:` + sink-binding call args, the
# callee's value re-exported as the call node's value, and ${<call>.output.field}
# dotted access into the callee's object output downstream.

id: call-take
name: call_take
description: Research one topic (via call) and add a one-line neutral observation.

input:
  topic: str

uses:
  research-one: 03-research-one   # external sibling flow, resolved by filename on the search path

nodes:
  research:
    kind: call
    call: research-one          # resolves via the uses: alias above (external sibling flow)
    input:                      # sink: bind the callee's parameters
      topic: ${input.topic}
      # as_of is omitted -> the CALLEE flow's own default (today) fills it
    # research's value IS the callee's return object {report, asof}; reference fields
    # downstream as ${research.output.report} / ${research.output.asof}.

  take:
    kind: agent
    input:
      brief: ${research.output.report}     # dot into the call node's object value
      asof:  ${research.output.asof}
    output: str
    prompt: |-
      Given this research brief (as of ${asof}), add ONE neutral one-line
      observation (no recommendations, no value target):
      ${brief}

output:
  report:      ${research.output.report}
  observation: ${take.output}
