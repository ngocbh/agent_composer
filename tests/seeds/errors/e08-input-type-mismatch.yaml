# e08 — Flow input fails type enforcement at the boundary.
# EXPECT: RUNTIME RunFailed at the input boundary — `window` is declared `int`, but the
# run passes a non-numeric string that can't coerce. Pins: L3 runtime type enforcement
# (the same `build_segment_with_type` check, applied at the flow-input boundary).
# No CODE node needed — the value comes straight from the run inputs.
#
# Trigger: run with  window: "soon"  (a runtime fixture states its triggering inputs).
# Expected message: input `window` — expected int, got str "soon".
#
# (The *write*-boundary variant — a node PRODUCING the wrong type — is the cleaner
# demonstration but needs a CODE fn that returns a bad value; deferred until the
# inline-code / CODE-node question is settled. See docs/TODO.md.)

id: err-input-type-mismatch
name: err_input_type_mismatch
description: (negative, runtime) a flow input value can't coerce to its declared type.

input:
  topic: str
  window: int                    # required integer

nodes:
  note:
    kind: agent
    input:
      topic:   ${input.topic}
      window: ${input.window}
    output: str
    prompt: "Write a one-line note on ${topic} over ${window} days. No advice."

output: ${note.output}
