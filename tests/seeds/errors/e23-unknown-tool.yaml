# e23 — a TOOL node referencing an unknown tool id. RUNTIME: not in TOOL_REGISTRY.
id: err-unknown-tool
name: err_unknown_tool
input:
  topic: str
nodes:
  fetch:
    kind: tool
    tool_id: nonesuch_tool       # ERROR at run: no such registered tool
    args:
      topic: ${input.topic}
output: ${fetch.output}
