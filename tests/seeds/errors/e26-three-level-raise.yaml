# e26 — a CODE callable that raises THREE levels deep (call -> def -> def).
#
# RUNTIME: the leaf `boom` node fails with a runtime-namespaced id `outer/mid/boom` — node
# `boom` in def `deep`, called from def `middle`, called from the top-level `outer:` call.
# The CLI call-traceback must box THREE stacked frames: `outer:` (this file), then the
# `via:` call line inside `defs:middle`, then the `boom` `code:` line inside `defs:deep`.
# CODE-only -> runs locally, no model.
id: err-three-level-raise
name: err_three_level_raise
input:
  topic: str

defs:
  deep:
    input:
      topic: str
    nodes:
      boom:
        kind: code
        code: tests.seeds.fns:fail_always
        input:
          topic: ${input.topic}
        output: str
    output: ${boom.output}
  middle:
    input:
      topic: str
    nodes:
      via:
        kind: call
        call: deep
        input:
          topic: ${input.topic}
    output: ${via.output}

nodes:
  outer:
    kind: call
    call: middle
    input:
      topic: ${input.topic}

output: ${outer.output}
