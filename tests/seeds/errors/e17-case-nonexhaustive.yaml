# e17 — a `case … on` over an enum producer leaves a tag uncovered with no `else:`. COMPILE.
id: err-case-nonexhaustive
name: err_case_nonexhaustive
input:
  topic: str
nodes:
  classify:
    kind: agent
    input:
      topic: ${input.topic}
    output: Literal["pro", "con", "flat"]
    prompt: "Classify ${topic}."
  route:
    kind: case
    on: ${classify.output}
    cases:
      - when: pro
        then: pro_note
      - when: con
        then: con_note
    # ERROR: `flat` is uncovered and there is no else:
  pro_note:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Pro ${topic}."
  con_note:
    kind: agent
    input:
      topic: ${input.topic}
    output: str
    prompt: "Con ${topic}."
output: ${pro_note.output | con_note.output}
