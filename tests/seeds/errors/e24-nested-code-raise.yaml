# e24 — a CODE callable that raises INSIDE a called child (a `defs:` sub-flow).
#
# RUNTIME: the inner `boom` node fails with a runtime-NAMESPACED id (`run/boom` — the
# parser only indexes top-level nodes), so the CLI can't locate that exact line. It must
# fall back to the OWNING top-level call node (`run`) and still box a real source frame
# rather than degrade to a bare `run failed:` line. Also exercises the captured Python
# traceback surfaced under `--engine-trace`.
id: err-nested-code-raise
name: err_nested_code_raise
input:
  topic: str

defs:
  inner:
    input:
      topic: str
    nodes:
      boom:
        kind: code
        code: tests.seeds.fns:fail_always
        input:
          topic: ${input.topic}
        output: str
    output: ${boom.output}

nodes:
  run:
    kind: call
    call: inner
    input:
      topic: ${input.topic}

output: ${run.output}
