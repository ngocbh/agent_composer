# e18 — a false BOUNDARY assert (${inputs}-only). RUNTIME: fails before any node runs.
# Run with window <= 0.
id: err-false-boundary-assert
name: err_false_boundary_assert
input:
  window: int
nodes:
  calc:
    kind: code
    input:
      window: ${input.window}
    output: int
    code: tests.seeds.fns:const_one
asserts:
  - "${input.window} > 0"      # false when window <= 0
output: ${calc.output}
