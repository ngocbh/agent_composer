# e21 — a CODE node returns the wrong type for its declared `outputs:`. RUNTIME:
# the typed write boundary rejects it.
id: err-code-wrong-type
name: err_code_wrong_type
input:
  topic: str
nodes:
  calc:
    kind: code
    input:
      topic: ${input.topic}
    output: int                       # declares int...
    code: tests.seeds.fns:wrong_type  # ...returns "not-an-int"
output: ${calc.output}
