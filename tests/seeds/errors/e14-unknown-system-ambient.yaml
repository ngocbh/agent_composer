# e14 — an unknown ${system.X} ambient. COMPILE: only today/now/run_id are valid.
id: err-unknown-system-ambient
name: err_unknown_system_ambient
input:
  topic: str
nodes:
  note:
    kind: agent
    input:
      topic: ${input.topic}
      rid: ${system.bogus}       # ERROR: system.bogus is not a valid ambient (only today/now/run_id)
    output: str
    prompt: "Rate ${topic} (${rid})."
output: ${note.output}
