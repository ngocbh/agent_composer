# lib_boom — a tiny EXTERNAL flow whose CODE node always raises.
#
# Imported by e25-external-raise.yaml via `uses:`. The inner `kaboom` node raises at
# runtime, so its failure surfaces with a runtime-namespaced id (`call/kaboom`) whose
# leaf line lives in THIS file — the CLI call-traceback must box a frame labelled with
# this filename pointing at the `code:` line here. CODE-only -> runs locally, no model.

id: lib_boom
name: lib_boom
description: An external flow whose only node raises (external-frame traceback fixture).

input:
  topic: str

nodes:
  kaboom:
    kind: code
    code: tests.seeds.fns:fail_always
    input:
      topic: ${input.topic}
    output: str

output: ${kaboom.output}
