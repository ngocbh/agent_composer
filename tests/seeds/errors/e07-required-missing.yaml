# e07 — Required-at-use-site (`:?`) missing at runtime.
# EXPECT: RUNTIME RunFailed (not a compile error) — `as_of` is an Optional param, omitted
# at the boundary, but `report` insists on it via `${input.as_of:?…}`. The TYPE allows
# null; this USE SITE does not. Pins: L3 loud failure for `:?`.
#
# Trigger: run this flow with `as_of` OMITTED (a runtime fixture needs its triggering
# inputs stated — unlike the compile fixtures, which fail regardless of inputs).
# Expected message: "as_of is required for the report".

id: err-required-missing
name: err_required_missing
description: (negative, runtime) :? on an omitted Optional param fails the run.

input:
  topic: str
  as_of: Optional[date]            # may be omitted -> null

nodes:
  report:
    kind: agent
    input:
      topic: ${input.topic}
      as_of:  ${input.as_of:?as_of is required for the report}   # required AT THIS SITE
    output: str
    prompt: "Write a neutral one-line note on ${topic} as of ${as_of}. No advice."

output: ${report.output}
