# e02 — Cyclic data graph.
# EXPECT: compile error — the inferred graph has a cycle (a -> b -> a). The graph is inferred
# from ${X.output} refs; a cycle is not a DAG (alang L4 / C4).

id: err-cycle
name: err_cycle

input:
  seed: str

nodes:
  a:
    kind: agent
    input:
      x: ${b.output}          # a depends on b ...
    output: str
    prompt: "Echo ${x}."
  b:
    kind: agent
    input:
      x: ${a.output}          # ... and b depends on a -> cycle
    output: str
    prompt: "Echo ${x}."

output: ${a.output}
