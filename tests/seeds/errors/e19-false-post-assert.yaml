# e19 — a false POST-TERMINAL assert (${X.output}). RUNTIME: flips success to failed.
id: err-false-post-assert
name: err_false_post_assert
input:
  topic: str
nodes:
  calc:
    kind: code
    input:
      topic: ${input.topic}
    output: int
    code: tests.seeds.fns:const_one     # returns 1
asserts:
  - "${calc.output} > 100"      # 1 > 100 is false
output: ${calc.output}
